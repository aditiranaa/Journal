name: Debug CI

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files (debug)
        run: |
          echo "FILES:"
          find src -type f

      - name: Search BubbleMenu (debug)
        run: |
          echo "SEARCHING BubbleMenu..."
          grep -r "BubbleMenu" src || echo "NOT FOUND"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build